<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>削除確認</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 420px; text-align: center; }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h2 { color: #333; margin-bottom: 12px; }
        .record-info { background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; padding: 16px; margin: 20px 0; text-align: left; }
        .record-info p { color: #555; margin-bottom: 6px; font-size: 15px; }
        .record-info span { font-weight: bold; color: #333; }
        .warning { color: #e53935; font-size: 14px; margin-bottom: 24px; }
        .buttons { display: flex; gap: 12px; }
        .btn-cancel { flex: 1; padding: 12px; background: #eee; color: #333; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .btn-cancel:hover { background: #ddd; }
        .btn-delete { flex: 1; padding: 12px; background: #e53935; color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
        .btn-delete:hover { background: #c62828; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">🗑</div>
        <h2>本当に削除しますか？</h2>
        <div class="record-info">
            <p>Day：<span>{{ record.day }}</span></p>
            <p>内容：<span>{{ record.content }}</span></p>
        </div>
        <p class="warning">⚠️ この操作は取り消せません</p>
        <div class="buttons">
            <a href="/dashboard" class="btn-cancel">キャンセル</a>
            <form method="POST" style="flex:1;">
                <button type="submit" class="btn-delete">削除する</button>
            </form>
        </div>
    </div>
</body>
</html>
