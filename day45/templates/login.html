<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <style>
        body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 360px; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2196F3; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .error { color: red; text-align: center; margin-bottom: 10px; }
        .link { text-align: center; margin-top: 15px; }
        a { color: #2196F3; }
        .flash-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; padding: 10px; border-radius: 6px; text-align: center; margin-bottom: 12px; }
        .flash-info { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; padding: 10px; border-radius: 6px; text-align: center; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔑 ログイン</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <p class="flash-{{ category }}">{{ message }}</p>
            {% endfor %}
        {% endwith %}
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="ユーザー名" required>
            <input type="password" name="password" placeholder="パスワード" required>
            <button type="submit">ログイン</button>
        </form>
        <div class="link">アカウントをお持ちでない方は <a href="/register">新規登録</a></div>
    </div>
</body>
</html>
