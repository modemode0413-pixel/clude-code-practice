<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>学習記録を編集</title>
    <style>
        body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 400px; }
        h2 { text-align: center; color: #333; }
        label { display: block; margin: 10px 0 4px; color: #555; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2196F3; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .back { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>✏️ 学習記録を編集</h2>
        <form method="POST">
            <label>Day番号</label>
            <input type="number" name="day" value="{{ record[1] }}" required>
            <label>学習内容</label>
            <input type="text" name="content" value="{{ record[2] }}" required>
            <label>スコア（0〜100）</label>
            <input type="number" name="score" min="0" max="100" value="{{ record[3] }}" required>
            <button type="submit">更新する</button>
        </form>
        <a href="/dashboard" class="back">← ダッシュボードに戻る</a>
    </div>
</body>
</html>
